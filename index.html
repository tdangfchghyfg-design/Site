<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>GAMEBOOTER</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;color:#fff;font-family:Arial;padding:10px}.c{border:2px solid #A020F0;border-radius:12px;padding:15px;max-width:500px;margin:0 auto}h1,h3{color:#A020F0;text-align:center}h3{margin:15px 0 8px;border-bottom:1px solid #A020F0;padding-bottom:4px;text-align:left}.p{display:flex;flex-direction:column;gap:10px}.i{background:#111;border:1px solid #A020F0;border-radius:8px;padding:12px;display:flex;justify-content:space-between;align-items:center}.l{font-size:14px;color:#ccc}.s{font-size:11px;margin-top:2px}.s.on{color:#0f0}.s.off{color:#f44}.w{position:relative;width:46px;height:24px}.w input{opacity:0;width:0;height:0}.d{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#333;border:1px solid #A020F0;transition:.3s;border-radius:24px}.d:before{position:absolute;content:"";height:18px;width:18px;left:2px;bottom:2px;background:#A020F0;transition:.3s;border-radius:50%}input:checked+.d{background:#A020F0}input:checked+.d:before{transform:translateX(22px);background:#000}#log{margin-top:12px;padding:10px;background:#111;border:1px solid #A020F0;border-radius:8px;height:150px;overflow-y:auto;font-size:11px;color:#A020F0}.b{width:100%;margin-top:8px;padding:8px;background:#A020F0;color:#000;border:none;border-radius:8px;font-weight:bold;cursor:pointer}#key{width:100%;margin-top:8px;padding:8px;background:#111;border:1px solid #A020F0;border-radius:8px;color:#0f0;font-family:monospace;text-align:center;text-transform:uppercase}</style></head><body><div class="c"><h1>GAMEBOOTER</h1><h3>HỖ TRỢ</h3><div class="p"><div class="i"><div><div class="l">FIX LAG</div><div class="s off" id="f0-s">Off</div></div><label class="w"><input type="checkbox" id="f0" onchange="t(0)" disabled><span class="d"></span></label></div><div class="i"><div><div class="l">BOOSTER</div><div class="s off" id="f1-s">Off</div></div><label class="w"><input type="checkbox" id="f1" onchange="t(1)" disabled><span class="d"></span></label></div></div><h3>DEVICE</h3><div class="p"><div class="i"><div><div class="l">QUÉT VIRUS</div><div class="s off" id="f2-s">Off</div></div><label class="w"><input type="checkbox" id="f2" onchange="t(2)" disabled><span class="d"></span></label></div><div class="i"><div><div class="l">DỌN RÁC</div><div class="s off" id="f3-s">Off</div></div><label class="w"><input type="checkbox" id="f3" onchange="t(3)" disabled><span class="d"></span></label></div><div class="i"><div><div class="l">TĂNG FPS</div><div class="s off" id="f4-s">Off</div></div><label class="w"><input type="checkbox" id="f4" onchange="t(4)" disabled><span class="d"></span></label></div><div class="i"><div><div class="l">SUPPORT</div><div class="s off" id="f5-s">Off</div></div><label class="w"><input type="checkbox" id="f5" onchange="t(5)" disabled><span class="d"></span></label></div></div><h3>MÃ KÍCH HOẠT</h3><input id="key" placeholder="VD: GB26-1234" maxlength="9"><button class="b" onclick="x()">KÍCH HOẠT</button><button class="b" onclick="r()">RESET</button><div id="log"><div>> Nhập mã để mở khóa...</div></div></div><script>const n=['FIX LAG','BOOSTER','QUÉT VIRUS','DỌN RÁC','TĂNG FPS','SUPPORT'],l=[['Quét app ngầm','Dọn RAM','Tối ưu CPU','Done'],['High Performance','Tăng quạt','Ưu tiên mạng','Done'],['Quét C:','Quét D:','0 virus','Done'],['Xóa temp','Xóa cache','Dọn rác','Done'],['Tắt hiệu ứng','Ưu tiên GPU','Khóa 144FPS','Done'],['Check server','Mở web support','Tải info','Done']];let act=!1;function t(i){if(!act)return;const c=document.getElementById('f'+i),s=document.getElementById('f'+i+'-s'),g=document.getElementById('log');if(c.checked){s.textContent='On';s.className='s on';g.innerHTML+=`<div>> ${n[i]}</div>`;l[i].forEach(e=>g.innerHTML+=`<div>> ${e}</div>`)}else{s.textContent='Off';s.className='s off';g.innerHTML+=`<div>> Tắt ${n[i]}</div>`}g.scrollTop=g.scrollHeight}function x(){const k=document.getElementById('key').value.trim().toUpperCase(),g=document.getElementById('log');if(!k)return g.innerHTML+=`<div>> Nhập mã đã bro</div>`;if(v(k)){act=!0;for(let i=0;i<6;i++)document.getElementById('f'+i).disabled=!1;g.innerHTML+=`<div>> Kích hoạt thành công!</div>`;document.getElementById('key').disabled=!0}else g.innerHTML+=`<div>> Mã sai!</div>`;g.scrollTop=g.scrollHeight}function v(k){if(k.length!==9||k[4]!=='-')return!1;const d=new Date,day=d.getDate(),mon=d.getMonth()+1,sum=day*mon*26;let s=0;for(let i=0;i<9;i++)if(i!==4)s+=k.charCodeAt(i);return s%1000===sum%1000}function r(){for(let i=0;i<6;i++){document.getElementById('f'+i).checked=!1;document.getElementById('f'+i).disabled=!act;t(i)}if(!act)for(let i=0;i<6;i++)document.getElementById('f'+i).disabled=!0;document.getElementById('log').innerHTML='<div>> Reset...</div>'}document.oncontextmenu=e=>e.preventDefault()</script></body></html>
