<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><title>GEN KEY</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;color:#fff;font-family:Arial;padding:20px;text-align:center}.c{border:2px solid #A020F0;border-radius:12px;padding:30px;max-width:400px;margin:0 auto}h1{color:#A020F0;margin-bottom:20px}#key{font-size:24px;color:#0f0;background:#111;border:1px solid #A020F0;border-radius:8px;padding:15px;margin:20px 0;font-family:monospace;letter-spacing:3px}.b{width:100%;padding:12px;background:#A020F0;color:#000;border:none;border-radius:8px;font-weight:bold;cursor:pointer;margin-top:10px}.b:hover{background:#8B1A9E}p{color:#ccc;font-size:13px;margin-top:15px}</style></head><body><div class="c"><h1>GEN MÃ GAMEBOOTER</h1><div id="key">GB26-0000</div><button class="b" onclick="g()">TẠO MÃ HÔM NAY</button><button class="b" onclick="c()">COPY MÃ</button><p>Mã dùng trong ngày<br>Format: GB26-XXXX</p></div><script>function g(){const d=new Date,day=d.getDate(),mon=d.getMonth()+1,sum=day*mon*26;let k='GB26-',s=0;for(let i=0;i<4;i++)s+='GB26-'.charCodeAt(i);const chars='0123456789';for(let i=0;i<4;i++){let n=Math.floor(Math.random()*10);k+=n;s+=n.toString().charCodeAt(0)}const need=sum%1000-s%1000;k=k.slice(0,8)+(Math.abs(need)%10);document.getElementById('key').textContent=k}function c(){navigator.clipboard.writeText(document.getElementById('key').textContent);alert('Đã copy!')}g()</script></body></html>
